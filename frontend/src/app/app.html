<header class="topbar">
  <a class="brand" routerLink="/">
    <span class="fox">🦊</span>
    <span class="brand-name">LernFuchs</span>
  </a>

  <div class="learn-switch" title="Was möchtest du üben?">
    <span class="ls-label">Üben:</span>
    <button class="ls-btn" [class.active]="language() === 'Deutsch'"
            (click)="switchLanguage('Deutsch')">Deutsch</button>
    <button class="ls-btn" [class.active]="language() === 'Englisch'"
            (click)="switchLanguage('Englisch')">Englisch</button>
  </div>

  @if (game.state(); as s) {
    <div class="hud">
      <div class="hud-level" title="Level {{ s.level }}">
        <span class="lvl-badge">Lvl {{ s.level }}</span>
        <div class="xp-bar"><div class="xp-fill" [style.width.%]="levelProgress()"></div></div>
      </div>
      <div class="hud-streak" title="{{ s.currentStreakDays }} Tage in Folge">
        🔥 <strong>{{ s.currentStreakDays }}</strong>
      </div>
    </div>
  }

  <nav class="nav">
    <a routerLink="/wortschatz" routerLinkActive="active">📚 Wortschatz</a>
    <a routerLink="/lesen" routerLinkActive="active">📖 Leseverständnis</a>
    <a routerLink="/spiele" routerLinkActive="active">🎮 Spiele</a>
    <button class="sound-toggle" (click)="toggleSound()"
            [title]="muted() ? 'Ton einschalten' : 'Ton ausschalten'">
      {{ muted() ? '🔇' : '🔊' }}
    </button>
  </nav>
</header>

@if (game.latestAchievement(); as badge) {
  <div class="achievement-toast">
    <span class="at-icon">{{ badge.icon }}</span>
    <div>
      <div class="at-title">Neues Abzeichen!</div>
      <div class="at-name">{{ badge.title }} – {{ badge.description }}</div>
    </div>
  </div>
}

<main>
  <router-outlet></router-outlet>
</main>
