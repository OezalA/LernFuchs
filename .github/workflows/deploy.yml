name: Deploy to Azure

# Deploys the app to Azure App Service on every push to main.
# Authenticates via OpenID Connect (OIDC) — no stored passwords/publish profile.
# Requires these repository secrets (identifiers, set up once):
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual runs from the Actions tab

permissions:
  id-token: write # required to request the OIDC token
  contents: read

env:
  AZURE_WEBAPP_NAME: lernfuchs-oezal-2026
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Publishing the API also builds the Angular frontend and copies it into
      # wwwroot (see the PublishAngular target in LernFuchs.Api.csproj).
      - name: Publish
        run: dotnet publish backend/LernFuchs.Api/LernFuchs.Api.csproj --configuration Release -o publish

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: publish
